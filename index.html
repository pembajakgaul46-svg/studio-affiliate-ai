<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .gradient-border { position: relative; background: #1e293b; border-radius: 1rem; }
        .gradient-border::before { content: ""; position: absolute; inset: -2px; background: linear-gradient(45deg, #6366f1, #a855f7, #ec4899); border-radius: 1.1rem; z-index: -1; opacity: 0.3; }
        .loader-ring { display: inline-block; width: 50px; height: 50px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #6366f1; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .chip-active { background: #6366f1 !important; border-color: #818cf8 !important; color: white !important; }
        .upload-card { transition: all 0.2s ease; border: 2px dashed #334155; background: rgba(15, 23, 42, 0.5); }
        .upload-card:hover { border-color: #6366f1; background: rgba(99, 102, 241, 0.05); }
        .preview-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .copy-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 10px 20px; border-radius: 99px; z-index: 100; display: none; }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div id="toast" class="copy-toast shadow-lg">Berhasil disalin!</div>
    <div class="max-w-6xl mx-auto px-4 pt-10">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-pink-400">AI Photo Studio Pro</h1>
                <p class="text-slate-400 mt-1 text-sm md:text-base">Visual Produk & Generator Video Motion AI.</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="gradient-border p-6 shadow-xl">
                    <h2 class="text-lg font-semibold mb-6 flex items-center gap-2 border-b border-slate-700 pb-3"><i class="fas fa-upload text-indigo-400"></i> Sumber Gambar</h2>
                    <div class="mb-5">
                        <label class="text-xs uppercase tracking-wider text-slate-500 font-bold mb-2 block">1. Wajah (Model)</label>
                        <div onclick="document.getElementById('faceInput').click()" class="upload-card p-3 rounded-xl cursor-pointer text-center">
                            <input type="file" id="faceInput" class="hidden" accept="image/*" onchange="handlePreview(this, 'facePreview')">
                            <div id="facePreview" class="text-slate-500 py-4"><i class="fas fa-user-circle text-2xl mb-2"></i><p class="text-[10px]">Klik untuk unggah wajah</p></div>
                        </div>
                    </div>
                    <div class="mb-5">
                        <label class="text-xs uppercase tracking-wider text-slate-500 font-bold mb-2 block">2. Produk (Pakaian)</label>
                        <div onclick="document.getElementById('clothInput').click()" class="upload-card p-3 rounded-xl cursor-pointer text-center">
                            <input type="file" id="clothInput" class="hidden" accept="image/*" onchange="handlePreview(this, 'clothPreview')">
                            <div id="clothPreview" class="text-slate-500 py-4"><i class="fas fa-tshirt text-2xl mb-2"></i><p class="text-[10px]">Klik untuk unggah pakaian</p></div>
                        </div>
                    </div>
                    <div class="mb-6">
                        <label class="text-xs uppercase tracking-wider text-slate-500 font-bold mb-2 block">3. Latar (Background)</label>
                        <div onclick="document.getElementById('bgInput').click()" class="upload-card p-3 rounded-xl cursor-pointer text-center">
                            <input type="file" id="bgInput" class="hidden" accept="image/*" onchange="handlePreview(this, 'bgPreview')">
                            <div id="bgPreview" class="text-slate-500 py-4"><i class="fas fa-image text-2xl mb-2"></i><p class="text-[10px]">Klik untuk unggah latar</p></div>
                        </div>
                    </div>
                    <h2 class="text-lg font-semibold mb-4 mt-8 flex items-center gap-2 border-b border-slate-700 pb-3"><i class="fas fa-video text-indigo-400"></i> Kamera & Rasio</h2>
                    <div class="space-y-4">
                        <select id="cameraAngle" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-slate-300">
                            <option value="Eye Level">Sejajar Mata</option>
                            <option value="Low Angle">Sudut Rendah</option>
                            <option value="Drone Shot">Drone Shot</option>
                        </select>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setRatio('1:1', this)" class="ratio-btn chip-active bg-slate-900 border border-slate-700 p-2 rounded-md text-[10px] font-bold">1:1</button>
                            <button onclick="setRatio('9:16', this)" class="ratio-btn bg-slate-900 border border-slate-700 p-2 rounded-md text-[10px] font-bold">9:16</button>
                            <button onclick="setRatio('16:9', this)" class="ratio-btn bg-slate-900 border border-slate-700 p-2 rounded-md text-[10px] font-bold">16:9</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-6 shadow-xl">
                    <textarea id="additionalPrompt" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white h-24 focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Detail produk (Contoh: Kemeja flanel kotak-kotak...)"></textarea>
                    <button id="generateBtn" class="w-full mt-6 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 active:scale-[0.98]">
                        <i class="fas fa-bolt"></i> PROSES GAMBAR & PROMPT VIDEO
                    </button>
                </div>

                <div id="outputContainer" class="hidden">
                    <div id="loadingState" class="hidden flex flex-col items-center justify-center py-24 bg-slate-800/30 rounded-2xl border-2 border-dashed border-slate-700">
                        <div class="loader-ring mb-4"></div>
                        <p class="text-slate-400">Sedang diproses AI...</p>
                    </div>
                    <div id="resultCard" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="relative rounded-2xl overflow-hidden border border-slate-700 bg-slate-900">
                            <img id="mainImage" src="" alt="AI Result" class="w-full h-auto">
                        </div>
                        <div class="space-y-4">
                            <div class="p-5 rounded-2xl border border-indigo-500/30 bg-indigo-900/10">
                                <h3 class="text-xs font-bold text-indigo-400 uppercase mb-2">Video Prompt</h3>
                                <div id="videoPromptContent" class="text-xs text-indigo-100 italic"></div>
                                <button onclick="copyText('videoPromptContent')" class="mt-2 text-indigo-400 text-[10px] underline">Salin</button>
                            </div>
                            <div class="p-5 rounded-2xl border border-slate-700 bg-slate-900/50">
                                <h3 class="text-xs font-bold text-slate-400 uppercase mb-2">TikTok Copywriting</h3>
                                <div id="marketingContent" class="text-xs text-slate-300"></div>
                                <button onclick="copyText('marketingContent')" class="mt-2 text-indigo-400 text-[10px] underline">Salin</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="errorMsg" class="hidden bg-red-500/10 border border-red-500/50 p-4 rounded-xl text-red-400 text-center text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN API KEY ANDA DI SINI
        const apiKey = "AIzaSyDeP0wUZi9MoQFN9WH1Ha5qIx546zW6FeE";
        
        let currentRatio = "1:1";
        const imagesData = { face: null, cloth: null, background: null };

        function setRatio(ratio, btn) {
            currentRatio = ratio;
            document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('chip-active'));
            btn.classList.add('chip-active');
        }

        function handlePreview(input, previewId) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                imagesData[previewId.replace('Preview', '')] = e.target.result.split(',')[1];
                document.getElementById(previewId).innerHTML = `<img src="${e.target.result}" class="preview-img">`;
            };
            reader.readAsDataURL(file);
        }

        async function generateContent() {
            if (!apiKey || apiKey.includes("PASTE_API")) {
                alert("Harap masukkan API Key Gemini di dalam kode!");
                return;
            }

            const loadingState = document.getElementById('loadingState');
            const resultCard = document.getElementById('resultCard');
            const errorMsg = document.getElementById('errorMsg');
            const outputContainer = document.getElementById('outputContainer');
            
            errorMsg.classList.add('hidden');
            outputContainer.classList.remove('hidden');
            loadingState.classList.remove('hidden');
            resultCard.classList.add('hidden');

            const extra = document.getElementById('additionalPrompt').value;

            try {
                // Gunakan Gemini 1.5 Flash - Ini Alamat URL yang Benar dan Stabil
                // Ganti baris URL lama dengan ini:
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{
                        parts: [{ text: `Produk: ${extra}. Kamera: ${document.getElementById('cameraAngle').value}. Buat copywriting TikTok singkat + 5 hashtag.` }]
                    }]
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Server AI menolak. Periksa API Key Anda.");
                
                const data = await response.json();
                const textResult = data.candidates[0].content.parts[0].text;
                
                // Karena model 1.5 Flash (Text) tidak menghasilkan gambar secara langsung dalam satu paket, 
                // Di sini biasanya kita butuh model terpisah. Untuk demo ini, kita tampilkan teksnya dulu.
                document.getElementById('videoPromptContent').innerText = "Cinematic orbital shot, slow motion.";
                document.getElementById('marketingContent').innerText = textResult;

                loadingState.classList.add('hidden');
                resultCard.classList.remove('hidden');
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
                loadingState.classList.add('hidden');
            }
        }

        function copyText(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        document.getElementById('generateBtn').addEventListener('click', generateContent);
    </script>
</body>
</html>
